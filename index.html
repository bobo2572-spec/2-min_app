<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>よむ、2分。</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="/2-min_app/manifest.json">
    <!-- iOS PWA サポート -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="よむ2分">
    <link rel="apple-touch-icon" href="/2-min_app/icon-192.png">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div id="app">

        <header class="app-header">
            <h1 class="app-title">よむ、2分。</h1>
            <p class="app-subtitle">読解力を鍛える</p>
            <div class="stats-row">
                <div class="stat-badge hidden" id="streak-badge">
                    <span id="streak-count">0</span> 日連続
                </div>
                <div class="stat-badge stat-badge--count hidden" id="daily-count">
                    今日 <span id="daily-count-num">0</span> 問
                </div>
            </div>
        </header>

        <!-- 問題一覧 -->
        <button id="list-toggle-btn" class="list-toggle-btn">≡ 問題一覧</button>
        <div id="question-list" class="question-list glass hidden"></div>

        <!-- 通常のクイズカード -->
        <div class="glass" id="quiz-card">
            <div class="tags-container" id="tags"></div>

            <div class="passage-section">
                <p id="passage"></p>
            </div>

            <p class="question-section" id="question"></p>

            <div class="choices-container" id="choices"></div>

            <button class="confirm-btn hidden" id="confirm-btn">答えを確認</button>

            <div class="explanation-area hidden" id="explanation-area">
                <span class="result-badge" id="result-badge"></span>

                <div class="explanation-block">
                    <p class="label">【 解説 】</p>
                    <p class="content-text" id="explanation-text"></p>
                </div>

                <button class="next-btn hidden" id="next-btn">次の問題へ</button>
            </div>
        </div>


        <!-- 管理者パネル（?admin で表示） -->
        <div class="admin-panel hidden" id="admin-panel">
            <h2 class="admin-title">管理者パネル</h2>

            <form id="admin-form" class="admin-form">
                <div class="admin-row admin-row--inline">
                    <div>
                        <label for="admin-element-no">要素No.</label>
                        <input type="number" id="admin-element-no" min="1" value="1" required>
                    </div>
                    <div>
                        <label for="admin-sequence-no">追番</label>
                        <input type="number" id="admin-sequence-no" min="1" value="1" required>
                    </div>
                    <div style="flex:2">
                        <label for="admin-title">タイトル</label>
                        <input type="text" id="admin-title" placeholder="例: 旅費精算" required>
                    </div>
                </div>
                <div class="admin-row">
                    <label for="admin-passage">本文</label>
                    <textarea id="admin-passage" rows="6" required></textarea>
                </div>
                <div class="admin-row">
                    <label for="admin-question">問い</label>
                    <textarea id="admin-question" rows="2" required></textarea>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-a">選択肢 A</label>
                    <input type="text" id="admin-choice-a" required>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-b">選択肢 B</label>
                    <input type="text" id="admin-choice-b" required>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-c">選択肢 C</label>
                    <input type="text" id="admin-choice-c" required>
                </div>
                <div class="admin-row">
                    <label>答え（複数選択可）</label>
                    <div class="admin-check-group">
                        <label class="admin-check"><input type="checkbox" id="admin-ans-a"> A</label>
                        <label class="admin-check"><input type="checkbox" id="admin-ans-b"> B</label>
                        <label class="admin-check"><input type="checkbox" id="admin-ans-c"> C</label>
                    </div>
                </div>
                <div class="admin-row">
                    <label for="admin-explanation">解説</label>
                    <textarea id="admin-explanation" rows="4" required></textarea>
                </div>
                <button type="submit" class="admin-submit-btn">問題を追加</button>
            </form>

            <div id="admin-list" class="admin-list"></div>
        </div>

        <footer class="app-footer">
            <button id="notification-toggle" type="button" class="notification-toggle">
                通知 ON
            </button>
            <button id="test-notification-btn" type="button" class="test-notify-btn">
                🔔 今すぐテスト送信
            </button>
            <p>© 2026 よむ、2分。</p>
        </footer>

    </div>

    <script src="script.js?v=12"></script>
</body>
</html>
