<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>よむ、2分。</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="/2-min_app/manifest.json">
    <!-- iOS PWA サポート -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="よむ2分">
    <link rel="apple-touch-icon" href="/2-min_app/icon-192.png">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <div id="app">

        <header class="app-header">
            <h1 class="app-title">よむ、2分。</h1>
            <p class="app-subtitle">読解力を鍛える</p>
            <div class="stats-row">
                <div class="stat-badge hidden" id="streak-badge">
                    <span id="streak-count">0</span> 日連続
                </div>
                <div class="stat-badge stat-badge--count hidden" id="daily-count">
                    今日 <span id="daily-count-num">0</span> 問
                </div>
            </div>
        </header>

        <!-- 通常のクイズカード -->
        <div class="glass" id="quiz-card">
            <div class="tags-container" id="tags"></div>

            <div class="passage-section">
                <p id="passage"></p>
            </div>

            <p class="question-section" id="question"></p>

            <div class="choices-container" id="choices"></div>

            <div class="explanation-area hidden" id="explanation-area">
                <span class="result-badge" id="result-badge"></span>

                <div class="explanation-block">
                    <p class="label">【 根拠引用 】</p>
                    <p class="content-text" id="evidence-text"></p>
                </div>

                <div class="explanation-block">
                    <p class="label">【 読み方のコツ 】</p>
                    <p class="content-text" id="tip-text"></p>
                </div>

                <button class="next-btn hidden" id="next-btn">次の問題へ</button>
            </div>
        </div>


        <!-- 管理者パネル（?admin で表示） -->
        <div class="admin-panel hidden" id="admin-panel">
            <h2 class="admin-title">管理者パネル</h2>

            <form id="admin-form" class="admin-form">
                <div class="admin-row">
                    <label for="admin-genre">ジャンル</label>
                    <input type="text" id="admin-genre" placeholder="例: 論説文" required>
                </div>
                <div class="admin-row">
                    <label for="admin-skill">スキルタグ</label>
                    <input type="text" id="admin-skill" placeholder="例: 筆者の主張" required>
                </div>
                <div class="admin-row">
                    <label for="admin-passage">問題文（本文）</label>
                    <textarea id="admin-passage" rows="6" required></textarea>
                </div>
                <div class="admin-row">
                    <label for="admin-question">設問</label>
                    <textarea id="admin-question" rows="2" required></textarea>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-a">選択肢 A</label>
                    <input type="text" id="admin-choice-a" required>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-b">選択肢 B</label>
                    <input type="text" id="admin-choice-b" required>
                </div>
                <div class="admin-row">
                    <label for="admin-choice-c">選択肢 C</label>
                    <input type="text" id="admin-choice-c" required>
                </div>
                <div class="admin-row">
                    <label for="admin-answer">正解</label>
                    <select id="admin-answer" required>
                        <option value="0">A</option>
                        <option value="1">B</option>
                        <option value="2">C</option>
                    </select>
                </div>
                <div class="admin-row">
                    <label for="admin-evidence">根拠引用（答えを支える本文の一節）</label>
                    <textarea id="admin-evidence" rows="2" required></textarea>
                </div>
                <div class="admin-row">
                    <label for="admin-tip">読み方のコツ</label>
                    <textarea id="admin-tip" rows="2" required></textarea>
                </div>
                <button type="submit" class="admin-submit-btn">問題を追加</button>
            </form>

            <div id="admin-list" class="admin-list"></div>
        </div>

        <footer class="app-footer">
            <button id="notification-toggle" type="button" class="notification-toggle">
                通知 ON
            </button>
            <button id="test-notification-btn" type="button" class="test-notify-btn">
                🔔 今すぐテスト送信
            </button>
            <p>© 2026 よむ、2分。</p>
        </footer>

    </div>

    <script src="script.js?v=8"></script>
</body>
</html>
