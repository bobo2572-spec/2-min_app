<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よむ、2分。</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <header class="app-header">
            <h1 class="app-title">よむ、2分。</h1>
            <p class="app-subtitle">1日1問、読解力を鍛える</p>
            <div class="streak-badge" id="streak-badge">
                <span id="streak-count">0</span> 日連続
            </div>
        </header>

        <!-- 通常のクイズカード -->
        <div class="glass" id="quiz-card">
            <div class="tags-container" id="tags"></div>

            <div class="passage-section">
                <p id="passage"></p>
            </div>

            <p class="question-section" id="question"></p>

            <div class="choices-container" id="choices"></div>

            <div class="explanation-area hidden" id="explanation-area">
                <span class="result-badge" id="result-badge"></span>

                <div class="explanation-block">
                    <p class="label">【 根拠引用 】</p>
                    <p class="content-text" id="evidence-text"></p>
                </div>

                <div class="explanation-block">
                    <p class="label">【 読み方のコツ 】</p>
                    <p class="content-text" id="tip-text"></p>
                </div>

                <button class="next-btn hidden" id="next-btn">次の問題へ</button>
            </div>
        </div>

        <!-- 当日回答済みカード -->
        <div class="glass hidden" id="already-answered-card">
            <p class="already-title">今日はもう解きました。</p>
            <p class="already-sub">また明日。</p>

            <div class="explanation-area" id="already-explanation">
                <div class="already-tags" id="already-tags"></div>

                <div class="explanation-block">
                    <p class="label">【 根拠引用 】</p>
                    <p class="content-text" id="already-evidence"></p>
                </div>

                <div class="explanation-block">
                    <p class="label">【 読み方のコツ 】</p>
                    <p class="content-text" id="already-tip"></p>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <button id="notification-toggle" class="notification-toggle" onclick="toggleNotification()">
                通知 ON
            </button>
            <p>© 2026 よむ、2分。</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
